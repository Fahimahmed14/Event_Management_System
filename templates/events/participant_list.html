{% extends 'base.html' %}
{% block content %}

<div class="container mx-auto py-16">
    <h1 class="text-3xl font-bold mb-10 text-center">Participants</h1>

    <div class="grid md:grid-cols-4 gap-6">
        {% for participant in participants %}
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h3 class="font-bold text-lg">{{ participant.name }}</h3>
            <p class="text-gray-600">{{ participant.email }}</p>
            <p class="text-sm text-indigo-500 mt-2">{{ participant.event.name }}</p>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
