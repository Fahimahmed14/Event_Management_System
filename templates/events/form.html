{% extends 'base.html' %}
{% block content %}

<section class="min-h-screen bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center py-16">

    <div class="bg-white w-full max-w-2xl p-10 rounded-3xl shadow-2xl">

        <!-- Title -->
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">
            {{ title }}
        </h2>

        <!-- Form -->
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">
                        {{ field.label }}
                    </label>

                    {{ field }}

                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">
                            {{ field.errors|striptags }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <!-- Buttons -->
            <div class="flex justify-between items-center pt-6">
                <a href="{% url 'event_list' %}"
                   class="text-gray-600 hover:text-gray-900 transition">
                    ← Cancel
                </a>

                <button type="submit"
                        class="bg-gradient-to-r from-indigo-500 to-pink-500 text-white px-8 py-3 rounded-xl font-semibold hover:scale-105 transition duration-300 shadow-lg">
                    Save Event
                </button>
            </div>

        </form>

    </div>

</section>

{% endblock %}
