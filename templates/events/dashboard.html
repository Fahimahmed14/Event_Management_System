{% extends 'base.html' %}
{% block content %}

<div class="container mx-auto py-16">

    <h1 class="text-4xl font-bold mb-10 text-center">Dashboard</h1>

    <div class="grid md:grid-cols-4 gap-6 mb-12">
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h2 class="text-2xl font-bold">{{ total_events }}</h2>
            <p>Total Events</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h2 class="text-2xl font-bold">{{ total_participants }}</h2>
            <p>Total Participants</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h2 class="text-2xl font-bold">{{ upcoming_count }}</h2>
            <p>Upcoming Events</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow text-center">
            <h2 class="text-2xl font-bold">{{ past_count }}</h2>
            <p>Past Events</p>
        </div>
    </div>

</div>

{% endblock %}
